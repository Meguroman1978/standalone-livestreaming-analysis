# fly.io アプリ設定
# アプリ名は既存のものに合わせる
app = "standalone-livestreaming-analysis"
primary_region = "nrt"   # 東京リージョン

[build]
  # Dockerfile を使ってビルド

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
